<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <main class="horizontal-scroll">
        <div class="gallery">
            <div class="item"><img src="img/foto1.jpg" alt="Work"></div>
            <div class="item wide"><img src="img/foto2.jpg" alt="Work"></div>
            <div class="item tall"><img src="img/foto3.jpg" alt="Work"></div>
            <div class="item"><img src="img/foto4.jpg" alt="Work"></div>
            <div class="item small"><img src="img/foto5.jpg" alt="Work"></div>
            <div class="item"><img src="img/foto6.jpg" alt="Work"></div>
            </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-section">
            <a href="index.html">Agnese Pozzobon</a>
        </div>
        <div class="nav-section center">
            <span>Recently Collected</span>
        </div>
        <div class="nav-section right">
            <span class="tags">Editorial Design, Identities, Visual Design, Publishing</span>
            <a href="about.html" class="about-link">→</a>
        </div>
    </nav>

    <script>
        // Script per permettere lo scorrimento orizzontale con la rotella del mouse
        const scrollContainer = document.querySelector(".horizontal-scroll");
        scrollContainer.addEventListener("wheel", (evt) => {
            evt.preventDefault();
            scrollContainer.scrollLeft += evt.deltaY;
        });
    </script>
</body>
</html>
