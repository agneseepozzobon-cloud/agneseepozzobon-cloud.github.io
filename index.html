    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* UI FISSA */
        .fixed-ui {
            position: fixed;
            top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1;
        }
        .nav-item { font-size: 13px; color: #000; flex: 1; }
        .nav-item.center { text-align: center; }
        .nav-item.right { text-align: right; }
        
        a { text-decoration: none; color: #000; transition: color 0.2s ease; cursor: pointer; position: relative; z-index: 100; }
        a:hover { color: rgb(0, 0, 255) !important; }

        /* GALLERIA */
        .horizontal-scroll {
            position: relative;
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            z-index: 5;
            pointer-events: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .gallery {
            display: flex;
            padding-left: 85vw; 
            padding-right: 200px;
            gap: 15px; 
            align-items: flex-start;
            height: 100%;
        }

        /* COLONNA */
        .item-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Margine costante tra elementi della pila */
            pointer-events: auto;
            max-height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .item-wrapper::-webkit-scrollbar { display: none; }

        .item-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
        }

        /* DIDASCALIA */
        .caption {
            display: none; 
            font-size: 12px;
            line-height: 1.2;
            background-color: #ffffff;
            padding: 4px 0;
            width: 100%;
            word-wrap: break-word;
            /* Rimuoviamo lo spazio vuoto sopra la dida per incollarla all'immagine */
            margin-top: -10px; 
        }

        /* Mostra didascalia quando il wrapper è attivo */
        .item-wrapper.active .caption { 
            display: block; 
        }

    </style>
</head>

        const totalImages = 135;
        let usedIds = new Set();
        config.forEach(c => c.ids.forEach(id => usedIds.add(id)));

        // Rendering
        config.sort((a, b) => a.ids[0] - b.ids[0]).forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';
            wrapper.style.width = item.w + 'vw';

            item.ids.forEach((id, index) => {
                const img = document.createElement('img');
                img.src = `img/AgnesePozzobon_${id}.webp`;
                img.loading = "lazy";
                
                img.addEventListener('click', () => {
                    wrapper.classList.toggle('active');
                });

                wrapper.appendChild(img);

                // Didascalia sempre dopo la prima immagine
                if (index === 0) {
                    const cap = document.createElement('div');
                    cap.className = 'caption';
                    cap.innerText = item.text;
                    wrapper.appendChild(cap);
                }
            });

            gallery.appendChild(wrapper);
        });

        // Logica Scroll Orizzontale / Verticale
        const container = document.getElementById('gallery-container');
        window.addEventListener("wheel", (evt) => {
            const activeStack = evt.target.closest('.item-wrapper');
            
            if (activeStack && activeStack.scrollHeight > activeStack.clientHeight) {
                const atBottom = activeStack.scrollTop + activeStack.clientHeight >= activeStack.scrollHeight - 1;
                const atTop = activeStack.scrollTop <= 0;

                if ((evt.deltaY > 0 && atBottom) || (evt.deltaY < 0 && atTop)) {
                    container.scrollLeft += evt.deltaY;
                } else {
                    return; 
                }
            } else {
                container.scrollLeft += evt.deltaY;
            }
        }, { passive: false });
