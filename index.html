<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <style>
        /* Reset base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #ffffff;
            /* Font Times New Roman come richiesto */
            font-family: "Times New Roman", Times, serif;
            color: #000000;
            -webkit-font-smoothing: antialiased;
        }

        /* Contenitore principale che occupa tutta la vista */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Spinge tutto il contenuto in basso */
            height: 100vh;
            padding: 40px; /* Margine dai bordi dello schermo */
        }

        /* Area delle immagini (in alto a destra come nello screenshot) */
        .image-gallery {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            gap: 10px;
            padding: 20px;
        }

        .image-gallery img {
            height: 450px; /* Regola l'altezza delle immagini */
            width: auto;
            display: block;
        }

        /* Griglia dei testi in basso */
        .footer-grid {
            display: grid;
            /* Dividiamo lo spazio in 3 colonne uguali */
            grid-template-columns: 1fr 1fr 1fr;
            align-items: end;
            font-size: 14px; /* Dimensione del font piccola ed elegante */
            letter-spacing: 0.2px;
        }

        /* Allineamenti specifici */
        .text-left { text-align: left; }
        .text-center { text-align: center; }
        .text-right { text-align: right; }

        /* Mobile responsive: su telefoni i testi si mettono uno sotto l'altro */
        @media (max-width: 768px) {
            .footer-grid {
                grid-template-columns: 1fr;
                gap: 20px;
                text-align: left;
            }
            .text-center, .text-right { text-align: left; }
            .image-gallery img { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="image-gallery">
        <img src="images/foto1.jpg" alt="Work 1">
        <img src="images/foto2.jpg" alt="Work 2">
    </div>

    <div class="container">
        <div class="footer-grid">
            <div class="text-left">
                Agnese Pozzobon
            </div>
            <div class="text-center">
                Recently Collected
            </div>
            <div class="text-right">
                Editorial Design, Identities, Visual Design, Publishing
            </div>
        </div>
    </div>

</body>
</html>
