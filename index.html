<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* --- DESKTOP UI (INVARIATA) --- */
        .fixed-ui {
            position: fixed;
            top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1;
            pointer-events: none;
        }
        .nav-item { font-size: 13px; color: #000; flex: 1; }
        .nav-item.center { text-align: center; transform: translateX(-25%); }
        .nav-item.right { text-align: right; }
        
        a { text-decoration: none; color: #000; transition: color 0.2s ease; cursor: pointer; position: relative; z-index: 100; pointer-events: auto; }
        a:hover { color: rgb(0, 0, 255) !important; }

        .horizontal-scroll {
            position: relative;
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            z-index: 5;
            pointer-events: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .gallery {
            display: flex;
            padding-left: 85vw; 
            padding-right: 200px;
            gap: 15px; 
            align-items: flex-start;
            height: 100%;
        }

        .item-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
            max-height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .item-wrapper::-webkit-scrollbar { display: none; }
        .item-wrapper img { display: block; width: 100%; height: auto; cursor: pointer; }

        .caption {
            display: none; 
            font-size: 12px;
            line-height: 1.2;
            background-color: #ffffff;
            padding: 4px 0;
            width: 100%;
            margin-top: -10px; 
        }
        .item-wrapper.active .caption { display: block; }

        /* --- MOBILE VERSION (FIXED CENTERING & CAPTION) --- */
        @media (max-width: 768px) {
            body, html { overflow-y: auto; overflow-x: hidden; height: auto; }

            .fixed-ui {
                position: fixed;
                top: 0; left: 0;
                transform: none;
                flex-direction: column;
                padding: 15px;
                gap: 4px;
                background: white;
                z-index: 5; /* Sotto le immagini */
                pointer-events: auto;
                width: 100%;
            }
            .nav-item { font-size: 14px; text-align: left !important; }
            
            .horizontal-scroll {
                height: auto;
                overflow: visible;
                padding-top: 100px; 
                pointer-events: auto;
                position: relative;
                z-index: 10; /* Sopra l'header */
            }

            .gallery {
                flex-direction: column;
                padding: 0;
                gap: 15px; 
                height: auto;
                align-items: center;
                background: transparent;
            }

            .item-wrapper {
                width: 100vw !important; 
                display: flex;
                flex-direction: column; /* Stack verticale per img + caption */
                align-items: center;
                gap: 0; /* Attacca la didascalia all'immagine */
            }

            /* Contenitore interno per lo scroll orizzontale delle immagini stacked */
            .images-container {
                display: flex;
                flex-direction: row;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 15px;
                width: 100%;
                padding: 0 15px;
                scrollbar-width: none;
            }
            .images-container::-webkit-scrollbar { display: none; }

            .item-wrapper img {
                width: calc(var(--mobile-w) * 2.5); 
                max-width: 88vw;
                height: auto;
                flex-shrink: 0;
                scroll-snap-align: center;
                display: block;
            }

            .caption {
                display: none; 
                width: calc(100% - 30px);
                margin: 0 15px;
                padding: 5px 0 15px 0; /* Spazio solo sotto il testo */
                font-size: 12px;
                line-height: 1.2;
                background: transparent;
                text-align: left;
            }
            
            .item-wrapper.active .caption { 
                display: block; 
            }
        }
    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="nav-item left">
            <a href="about.html">Agnese Pozzobon</a> &nbsp;&nbsp;&nbsp; Recently Collected
        </div>
        <div class="nav-item right">Editorial Design, Identities, Visual Design, Publishing</div>
    </div>

    <main class="horizontal-scroll" id="gallery-container">
        <div class="gallery" id="gallery"></div>
    </main>

    <script>
        const gallery = document.getElementById('gallery');
        const config = [
            // ... (stessa config di prima)
            { w: 25, ids: [1], text: "Visual research for the book Knots Knots Knots (2024) (with Ludovico Amenta, Matteo Beda)" },
            { w: 18, ids: [2], text: "Type explorations with clay for aradia’s identity (2023)" },
            { w: 20, ids: [3, 4, 5], text: "Monographical research on AG Fronzoni (2024)" },
            // ... Aggiungi qui gli altri dati della config ...
        ];

        config.sort((a, b) => a.ids[0] - b.ids[0]).forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';
            wrapper.style.setProperty('--mobile-w', item.w + 'vw');
            if (window.innerWidth > 768) wrapper.style.width = item.w + 'vw';

            // Container per le immagini (permette lo scroll orizzontale su mobile)
            const imgContainer = document.createElement('div');
            imgContainer.className = window.innerWidth <= 768 ? 'images-container' : '';

            item.ids.forEach((id) => {
                const img = document.createElement('img');
                img.src = `img/AgnesePozzobon_${id}.webp`;
                img.loading = "lazy";
                img.addEventListener('click', () => wrapper.classList.toggle('active'));
                
                if (window.innerWidth <= 768) {
                    imgContainer.appendChild(img);
                } else {
                    wrapper.appendChild(img);
                }
            });

            if (window.innerWidth <= 768) wrapper.appendChild(imgContainer);

            const cap = document.createElement('div');
            cap.className = 'caption';
            cap.innerText = item.text;
            wrapper.appendChild(cap);
            
            gallery.appendChild(wrapper);
        });

        // Wheel scroll desktop (invariato)
        const container = document.getElementById('gallery-container');
        window.addEventListener("wheel", (evt) => {
            if (window.innerWidth > 768) {
                const activeStack = evt.target.closest('.item-wrapper');
                if (activeStack && activeStack.scrollHeight > activeStack.clientHeight) {
                    const atBottom = activeStack.scrollTop + activeStack.clientHeight >= activeStack.scrollHeight - 1;
                    const atTop = activeStack.scrollTop <= 0;
                    if ((evt.deltaY > 0 && atBottom) || (evt.deltaY < 0 && atTop)) {
                        container.scrollLeft += evt.deltaY;
                    } else { return; }
                } else {
                    container.scrollLeft += evt.deltaY;
                }
            }
        }, { passive: false });
    </script>
</body>
</html>
