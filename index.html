<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            overflow: hidden;
        }

        /* TESTI FISSI */
        .fixed-ui {
            position: fixed;
            top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1;
            pointer-events: none;
        }
        .nav-item { font-size: 14px; color: #000; flex: 1; pointer-events: auto; }
        .nav-item.center { text-align: center; color: #888; }
        .nav-item.right { text-align: right; color: #888; }
        
        a { text-decoration: none; color: inherit; transition: color 0.2s; }
        a:hover { color: rgb(0, 0, 255) !important; }

        /* GALLERIA */
        .horizontal-scroll {
            position: relative;
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            z-index: 2;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .gallery {
            display: flex;
            padding-left: 50vw; /* Inizia a metà schermo */
            padding-right: 100px;
            gap: 10px; /* DISTANZA TRA IMMAGINI: 10PX */
            align-items: flex-start; /* APPESE IN ALTO */
        }

        .item-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Distanza tra immagini impilate (stacked) */
        }

        .item-wrapper img {
            width: auto;
            display: block;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="nav-item left"><a href="about.html">Agnese Pozzobon</a></div>
        <div class="nav-item center">Recently Collected</div>
        <div class="nav-item right">Editorial Design, Identities, Visual Design, Publishing</div>
    </div>

    <main class="horizontal-scroll" id="gallery-container">
        <div class="gallery" id="gallery"></div>
    </main>

    <script>
        const gallery = document.getElementById('gallery');

        /* CONFIGURAZIONE FACILE:
           Qui puoi gestire ogni blocco.
           - h: altezza in 'vh' (es. 55 è il 55% dell'altezza schermo)
           - ids: lista degli ID delle immagini (se ne metti due [1, 2] le mette stacked)
        */
        const config = [
            { h: 55, ids: [1] },
            { h: 30, ids: [2] },
            { h: 45, ids: [3, 4] }, // Queste due saranno STACKED
            { h: 50, ids: [5] },
            { h: 35, ids: [6] },
            { h: 55, ids: [7, 8] }, // Altre due STACKED
            { h: 40, ids: [9] },
            // ... continua così per tutte le 127 immagini
        ];

        // FUNZIONE PER GENERARE AUTOMATICAMENTE IL RESTO SE NON VUOI SCRIVERLE TUTTE A MANO
        // Se la config sopra è vuota o incompleta, questo loop riempie fino a 127
        const totalImages = 127;
        let usedIds = new Set();
        config.forEach(c => c.ids.forEach(id => usedIds.add(id)));

        for (let i = 1; i <= totalImages; i++) {
            if (usedIds.has(i)) continue;
            config.push({ h: Math.floor(Math.random() * (55 - 30 + 1)) + 30, ids: [i] });
        }

        // RENDER DELLA GALLERIA
        config.sort((a, b) => a.ids[0] - b.ids[0]).forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';

            item.ids.forEach(id => {
                const img = document.createElement('img');
                img.src = `img/AgnesePozzobon_${id}.webp`;
                // Applica l'altezza definita nella config
                img.style.height = item.h + 'vh'; 
                img.loading = "lazy";
                wrapper.appendChild(img);
            });

            gallery.appendChild(wrapper);
        });

        // SCROLL ORIZZONTALE
        const container = document.getElementById('gallery-container');
        container.addEventListener("wheel", (evt) => {
            evt.preventDefault();
            container.scrollLeft += evt.deltaY;
        });
    </script>
</body>
</html>
