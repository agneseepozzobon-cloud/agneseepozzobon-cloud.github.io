<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <link rel="icon" href="img/favicon_black.webp" media="(prefers-color-scheme: light)">
    <link rel="icon" href="img/favicon_white.webp" media="(prefers-color-scheme: dark)">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* LIVELLO TESTI FISSI - 13px e Neri */
        .fixed-ui {
            position: fixed;
            top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1;
        }
        .nav-item { font-size: 13px; color: #000; flex: 1; }
        .nav-item.center { text-align: center; }
        .nav-item.right { text-align: right; }
        
        a { text-decoration: none; color: #000; transition: color 0.2s ease; cursor: pointer; }
        a:hover { color: rgb(0, 0, 255) !important; }

        /* LIVELLO GALLERIA - Sopra i testi */
        .horizontal-scroll {
            position: relative;
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            z-index: 5;
            pointer-events: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .gallery {
            display: flex;
            padding-left: 85vw; 
            padding-right: 100px;
            gap: 10px; 
            align-items: flex-start;
        }

        /* WRAPPER PROGETTO */
        .item-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px; 
            pointer-events: auto;
            position: relative;
        }

        .item-wrapper img {
            width: auto;
            display: block;
            object-fit: contain;
            cursor: pointer;
        }

        /* DIDASCALIA - 12px e Attaccata */
        .caption {
            display: none; 
            font-size: 12px;
            line-height: 1.2;
            background-color: #ffffff;
            padding: 4px 0;
            width: 100%;
            z-index: 10;
        }

        /* Quando attivo, azzeriamo il gap tra img e caption */
        .item-wrapper.active { gap: 0; }

        .item-wrapper.active .caption { display: block; }

        /* Ripristiniamo il gap di 10px solo per le immagini che seguono la caption (stacked) */
        .item-wrapper.active .caption + img {
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="nav-item left"><a href="about.html">Agnese Pozzobon</a></div>
        <div class="nav-item center">Recently Collected</div>
        <div class="nav-item right">Editorial Design, Identities, Visual Design, Publishing</div>
    </div>

    <main class="horizontal-scroll" id="gallery-container">
        <div class="gallery" id="gallery"></div>
    </main>

    <script>
        const gallery = document.getElementById('gallery');

        /* CONFIGURAZIONE MANUALE:
           Qui puoi definire blocchi specifici (altezze, stacking e testi personalizzati)
        */
        const config = [
            { h: 55, ids: [1], text: "Titolo Progetto, Anno. Descrizione dettagliata del lavoro svolto." },
            { h: 45, ids: [2, 3], text: "Esempio Stacked: Didascalia sotto la prima immagine." }
        ];

        // AGGIORNATO A 135 IMMAGINI
        const totalImages = 135;
        let usedIds = new Set();
        config.forEach(c => c.ids.forEach(id => usedIds.add(id)));

        // Generazione automatica per le immagini non configurate manualmente
        for (let i = 1; i <= totalImages; i++) {
            if (usedIds.has(i)) continue;
            config.push({ 
                h: Math.floor(Math.random() * (55 - 35 + 1)) + 35, 
                ids: [i], 
                text: "Project Name, Image " + i + ". [Click to edit this text in the script]" 
            });
        }

        // Renderizzazione ordinata per ID
        config.sort((a, b) => a.ids[0] - b.ids[0]).forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';

            item.ids.forEach((id, index) => {
                const img = document.createElement('img');
                img.src = `img/AgnesePozzobon_${id}.webp`;
                img.style.height = item.h + 'vh';
                img.loading = "lazy";
                
                // Toggle della didascalia al click
                img.addEventListener('click', () => {
                    wrapper.classList.toggle('active');
                });

                wrapper.appendChild(img);

                // Inserimento didascalia sotto la prima immagine del blocco
                if (index === 0) {
                    const cap = document.createElement('div');
                    cap.className = 'caption';
                    cap.innerText = item.text;
                    wrapper.appendChild(cap);
                }
            });

            gallery.appendChild(wrapper);
        });

        // Scroll orizzontale fluido
        const container = document.getElementById('gallery-container');
        window.addEventListener("wheel", (evt) => {
            container.scrollLeft += evt.deltaY;
        });
    </script>
</body>
</html>
