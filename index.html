<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* TESTI FISSI - 13px e Neri */
        .fixed-ui {
            position: fixed;
            top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1;
            pointer-events: none; /* Non blocca lo scroll delle immagini */
        }
        
        .nav-item { 
            font-size: 13px; 
            color: #000000; 
            flex: 1; 
            pointer-events: auto; /* Riattiva il click sui link */
        }
        
        .nav-item.center { text-align: center; }
        .nav-item.right { text-align: right; }
        
        /* Link Agnese Pozzobon */
        a { 
            text-decoration: none; 
            color: #000000; 
            transition: color 0.2s ease; 
        }
        
        a:hover { 
            color: rgb(0, 0, 255) !important; 
        }

        /* GALLERIA */
        .horizontal-scroll {
            position: relative;
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            z-index: 2;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .gallery {
            display: flex;
            padding-left: 50vw; 
            padding-right: 100px;
            gap: 10px; 
            align-items: flex-start; /* Appese in alto */
        }

        .item-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }

        .item-wrapper img {
            width: auto;
            display: block;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="nav-item left">
            <a href="about.html">Agnese Pozzobon</a>
        </div>
        
        <div class="nav-item center">Recently Collected</div>
        <div class="nav-item right">Editorial Design, Identities, Visual Design, Publishing</div>
    </div>

    <main class="horizontal-scroll" id="gallery-container">
        <div class="gallery" id="gallery"></div>
    </main>

    <script>
        const gallery = document.getElementById('gallery');

        /* CONFIGURAZIONE h: altezza vh | ids: array ID immagini */
        /* Esempio: { h: 50, ids: [1, 2] } crea uno stack di due immagini alte 50vh l'una */
        const config = [
            { h: 55, ids: [1] },
            { h: 30, ids: [2] },
            { h: 45, ids: [3, 4] }
        ];

        const totalImages = 127;
        let usedIds = new Set();
        config.forEach(c => c.ids.forEach(id => usedIds.add(id)));

        for (let i = 1; i <= totalImages; i++) {
            if (usedIds.has(i)) continue;
            // Genera altezze casuali tra 30 e 55vh per le immagini non configurate
            config.push({ h: Math.floor(Math.random() * (55 - 30 + 1)) + 30, ids: [i] });
        }

        // Ordina e renderizza
        config.sort((a, b) => a.ids[0] - b.ids[0]).forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';
            item.ids.forEach(id => {
                const img = document.createElement('img');
                img.src = `img/AgnesePozzobon_${id}.webp`;
                img.style.height = item.h + 'vh'; 
                img.loading = "lazy";
                wrapper.appendChild(img);
            });
            gallery.appendChild(wrapper);
        });

        // Abilita scroll orizzontale con rotella
        const container = document.getElementById('gallery-container');
        container.addEventListener("wheel", (evt) => {
            evt.preventDefault();
            container.scrollLeft += evt.deltaY;
        });
    </script>
</body>
</html>
