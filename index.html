<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <link rel="icon" href="img/favicon_black.webp" media="(prefers-color-scheme: light)">
    <link rel="icon" href="img/favicon_white.webp" media="(prefers-color-scheme: dark)">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* TESTI FISSI - 13px e Neri */
        .fixed-ui {
            position: fixed;
            top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1;
        }
        .nav-item { font-size: 13px; color: #000; flex: 1; }
        .nav-item.center { text-align: center; }
        .nav-item.right { text-align: right; }
        
        a { text-decoration: none; color: #000; transition: color 0.2s ease; cursor: pointer; }
        a:hover { color: rgb(0, 0, 255) !important; }

        /* GALLERIA */
        .horizontal-scroll {
            position: relative;
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            z-index: 5;
            pointer-events: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .gallery {
            display: flex;
            padding-left: 85vw; 
            padding-right: 100px;
            gap: 10px; 
            align-items: flex-start;
        }

        /* WRAPPER PROGETTO - Si adatta alla larghezza dell'immagine */
        .item-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px; 
            pointer-events: auto;
            position: relative;
            width: fit-content; /* Fondamentale: il wrapper è largo quanto l'immagine */
        }

        .item-wrapper img {
            width: auto;
            display: block;
            max-width: none; /* Impedisce distorsioni */
            object-fit: contain;
            cursor: pointer;
        }

        /* DIDASCALIA - Wrappa sulla larghezza dell'immagine */
        .caption {
            display: none; 
            font-size: 12px;
            line-height: 1.2;
            background-color: #ffffff;
            padding: 4px 0;
            width: 100%; /* Prende la larghezza del wrapper (che è quella dell'immagine) */
            word-wrap: break-word; /* Forza il wrap del testo */
            z-index: 10;
        }

        /* Quando attivo, azzeriamo il gap per l'effetto cornice */
        .item-wrapper.active { gap: 0; }
        .item-wrapper.active .caption { display: block; }

        /* Margine per eventuali immagini sotto la caption nello stesso stack */
        .item-wrapper.active .caption + img {
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="nav-item left"><a href="about.html">Agnese Pozzobon</a></div>
        <div class="nav-item center">Recently Collected</div>
        <div class="nav-item right">Editorial Design, Identities, Visual Design, Publishing</div>
    </div>

    <main class="horizontal-scroll" id="gallery-container">
        <div class="gallery" id="gallery"></div>
    </main>

    <script>
        const gallery = document.getElementById('gallery');

        // Configurazione manuale (IDs e Testi)
        const config = [
            { h: 55, ids: [1], text: "Visual research for the book Knots Knots Knots (2024) (with Ludovico Amenta, Matteo Beda)" },
            { h: 45, ids: [2], text: "Type explorations with clay for aradia’s identity, an imaginary folk festival (2023) (with Roberta Antinolfi, Corinne Carlin, Martina Valente)" }
            { h: 40, ids: [3, 4, 5], text: "Monographical research on AG Fronzoni (2024) (with Noa Merlini, Martina Valente)" }
            { h: 20, ids: [6], text: "Shapes exploration (2025)" }
            { h: 50, ids: [7], text: "radio spugna self-made foldable talbe, where the broadcasting happens (2024)" }
            { h: 75, ids: [8], text: "Poster designed for a Goethe University lecture (2025) (with Matter Of)" }
            { h: 40, ids: [9], text: "radio spugna takes over Rumore space in Urbino (2024)" }
            { h: 25, ids: [10], text: "Contact print explorations (2024) (with Ludovico Amenta, Matteo Beda)" }
            { h: 45, ids: [11, 12], text: "Posters designed for the schedule of a radio spugna event in Urbino (2024)" }
            { h: 30, ids: [13], text: "Jim Fontana Summer After School Residency (2025) (with Martina Valente)" }
            { h: 50, ids: [14], text: "Screen printing radio spugna t-shirts (2024)" }
            { h: 40, ids: [15, 16, 17, 18, 19, 20, 21, 22], text: "radio spugna book–manual that besides the project chronology contains instructions to build a foldable table like ours and explains how to set-up a low- tech web radio (2024) (with Roberta Antinolfi, Nicolaï Vrenna Martini, Noa Merlini, Martina Valente)" }
            { h: 25, ids: [23], text: "Unused design for the Gewoelbe club (2025) (with Matter Of)" }
            { h: 35, ids: [24], text: "Hanged poster of Hyperknit, a project around knitting as a feminist practice (2023)" }
            { h: 15, ids: [25], text: "Unused design for the Gewoelbe club (2025) (with Matter Of)" }
        ];

        const totalImages = 135;
        let usedIds = new Set();
        config.forEach(c => c.ids.forEach(id => usedIds.add(id)));

        for (let i = 1; i <= totalImages; i++) {
            if (usedIds.has(i)) continue;
            config.push({ 
                h: Math.floor(Math.random() * (55 - 35 + 1)) + 35, 
                ids: [i], 
                text: "Project Name, Image " + i + ". Descrizione che si adatta alla larghezza." 
            });
        }

        config.sort((a, b) => a.ids[0] - b.ids[0]).forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';

            item.ids.forEach((id, index) => {
                const img = document.createElement('img');
                img.src = `img/AgnesePozzobon_${id}.webp`;
                img.style.height = item.h + 'vh';
                img.loading = "lazy";
                
                img.addEventListener('click', () => {
                    wrapper.classList.toggle('active');
                });

                wrapper.appendChild(img);

                if (index === 0) {
                    const cap = document.createElement('div');
                    cap.className = 'caption';
                    cap.innerText = item.text;
                    wrapper.appendChild(cap);
                }
            });

            gallery.appendChild(wrapper);
        });

        const container = document.getElementById('gallery-container');
        window.addEventListener("wheel", (evt) => {
            container.scrollLeft += evt.deltaY;
        });
    </script>
</body>
</html>
