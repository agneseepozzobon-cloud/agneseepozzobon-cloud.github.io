<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <link rel="icon" href="img/favicon_black.webp" media="(prefers-color-scheme: light)">
    <link rel="icon" href="img/favicon_white.webp" media="(prefers-color-scheme: dark)">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* TESTI FISSI */
        .fixed-ui {
            position: fixed;
            top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1;
        }
        .nav-item { font-size: 13px; color: #000; flex: 1; }
        .nav-item.center { text-align: center; }
        .nav-item.right { text-align: right; }
        a { text-decoration: none; color: #000; transition: color 0.2s ease; cursor: pointer; }
        a:hover { color: rgb(0, 0, 255) !important; }

        /* GALLERIA */
        .horizontal-scroll {
            position: relative;
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            z-index: 5;
            pointer-events: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .gallery {
            display: flex;
            padding-left: 85vw; 
            padding-right: 100px;
            gap: 10px; 
            align-items: flex-start;
        }

        /* PROGETTO */
        .item-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Gap tra blocchi stacked, ma gestito via JS per la caption */
            pointer-events: auto;
            position: relative;
        }

        .item-wrapper img {
            width: auto;
            display: block;
            object-fit: contain;
            cursor: pointer;
        }

        /* DIDASCALIA ATTACCATA */
        .caption {
            display: none; 
            font-size: 12px;
            line-height: 1.2;
            background-color: #ffffff;
            padding: 4px 0; /* Un minimo di respiro interno, ma 0 margine esterno */
            width: 100%; /* Si adatta alla larghezza dell'immagine */
            margin-top: 0px; 
            z-index: 10;
        }

        .item-wrapper.active .caption {
            display: block;
        }

        /* Rimuoviamo il gap standard solo quando la didascalia è attiva tra due immagini stacked */
        .item-wrapper.active {
            gap: 0px; 
        }
        /* Ma manteniamo un gap se ci sono immagini DOPO la didascalia nello stesso stack */
        .item-wrapper.active .caption + img {
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="nav-item left"><a href="about.html">Agnese Pozzobon</a></div>
        <div class="nav-item center">Recently Collected</div>
        <div class="nav-item right">Editorial Design, Identities, Visual Design, Publishing</div>
    </div>

    <main class="horizontal-scroll" id="gallery-container">
        <div class="gallery" id="gallery"></div>
    </main>

    <script>
        const gallery = document.getElementById('gallery');

        const config = [
            { h: 55, ids: [1], text: "Didascalia del primo progetto. Qui puoi scrivere i dettagli." },
            { h: 30, ids: [2], text: "Secondo progetto, immagine singola." },
            { h: 45, ids: [3, 4], text: "Queste immagini sono stacked. La didascalia appare sotto la prima." }
        ];

        const totalImages = 127;
        let usedIds = new Set();
        config.forEach(c => c.ids.forEach(id => usedIds.add(id)));
        for (let i = 1; i <= totalImages; i++) {
            if (usedIds.has(i)) continue;
            config.push({ h: 45, ids: [i], text: "Progetto " + i + ". Descrizione di prova." });
        }

        config.sort((a, b) => a.ids[0] - b.ids[0]).forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';

            item.ids.forEach((id, index) => {
                const img = document.createElement('img');
                img.src = `img/AgnesePozzobon_${id}.webp`;
                img.style.height = item.h + 'vh';
                img.loading = "lazy";
                
                img.addEventListener('click', () => {
                    wrapper.classList.toggle('active');
                });

                wrapper.appendChild(img);

                // Inserisce la didascalia esattamente dopo la prima immagine
                if (index === 0) {
                    const cap = document.createElement('div');
                    cap.className = 'caption';
                    cap.innerText = item.text;
                    wrapper.appendChild(cap);
                }
            });

            gallery.appendChild(wrapper);
        });

        const container = document.getElementById('gallery-container');
        window.addEventListener("wheel", (evt) => {
            container.scrollLeft += evt.deltaY;
        });
    </script>
</body>
</html>
