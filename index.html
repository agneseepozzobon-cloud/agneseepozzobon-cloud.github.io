<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Aggiunta specifica per l'hover blu */
        a {
            text-decoration: none;
            color: #000;
            transition: color 0.2s ease;
        }
        a:hover {
            color: rgb(0, 0, 255) !important;
        }
    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="nav-item left"><a href="about.html">Agnese Pozzobon</a></div>
        <div class="nav-item center">Recently Collected</div>
        <div class="nav-item right">Editorial Design, Identities, Visual Design, Publishing</div>
    </div>

    <main class="horizontal-scroll" id="gallery-container">
        <div class="gallery" id="gallery"></div>
    </main>

    <script>
        const gallery = document.getElementById('gallery');
        for (let i = 1; i <= 127; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';
            if (i % 5 === 0) wrapper.classList.add('small');
            if (i % 7 === 0) wrapper.classList.add('large');
            if (i % 4 === 0) wrapper.classList.add('stacked');
            const img = document.createElement('img');
            img.src = `img/AgnesePozzobon_${i}.webp`;
            img.loading = "lazy";
            wrapper.appendChild(img);
            gallery.appendChild(wrapper);
        }
        const container = document.getElementById('gallery-container');
        container.addEventListener("wheel", (evt) => {
            evt.preventDefault();
            container.scrollLeft += evt.deltaY;
        });
    </script>
</body>
</html>
