<script>
    const gallery = document.getElementById('gallery');
    const isMobile = window.innerWidth <= 768;

    // Assicurati che questa lista contenga TUTTI i tuoi dati (da 1 a 135)
    const config = [
        { w: 25, ids: [1], text: "Visual research for the book Knots Knots Knots (2024)" },
        { w: 18, ids: [2], text: "Type explorations with clay for aradia’s identity (2023)" },
        { w: 20, ids: [3, 4, 5], text: "Monographical research on AG Fronzoni (2024)" },
        // ... (inserisci qui tutti gli altri oggetti della lista)
        { w: 30, ids: [135], text: "radio spugna poster (2024)" }
    ];

    config.forEach(item => {
        const wrapper = document.createElement('div');
        wrapper.className = 'item-wrapper';
        wrapper.style.setProperty('--mobile-w', item.w + 'vw');
        if (!isMobile) wrapper.style.width = item.w + 'vw';

        const imgContainer = document.createElement('div');
        imgContainer.className = isMobile ? 'images-container' : 'contents'; 

        // Verifichiamo che ids esista e sia un array prima di ciclarlo
        if (item.ids && Array.isArray(item.ids)) {
            item.ids.forEach((id) => {
                const img = document.createElement('img');
                img.src = `img/AgnesePozzobon_${id}.webp`;
                img.loading = "lazy";
                
                // Gestione errore: se un'immagine manca, non bloccare il resto
                img.onerror = () => img.style.display = 'none';
                
                img.addEventListener('click', () => wrapper.classList.toggle('active'));
                
                if (isMobile) {
                    imgContainer.appendChild(img);
                } else {
                    wrapper.appendChild(img);
                }
            });
        }

        if (isMobile) wrapper.appendChild(imgContainer);

        const cap = document.createElement('div');
        cap.className = 'caption';
        cap.innerText = item.text || "";
        wrapper.appendChild(cap);
        
        gallery.appendChild(wrapper);
    });
</script>
