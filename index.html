<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* --- UI DESKTOP --- */
        .fixed-ui {
            position: fixed;
            top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1; /* Sotto le immagini */
            pointer-events: none;
        }
        .nav-item { font-size: 13px; color: #000; flex: 1; }
        .nav-item.right { text-align: right; }
        .recently-collected { margin-left: 200px; }

        a { 
            text-decoration: none; 
            color: #000; 
            transition: color 0.2s ease; 
            cursor: pointer; 
            position: relative; 
            z-index: 100; /* Alto per intercettare il click */
            pointer-events: auto; 
        }
        a:hover { color: rgb(0, 0, 255) !important; }

        .horizontal-scroll {
            position: relative;
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            z-index: 10; /* Sopra l'header desktop */
            pointer-events: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .gallery {
            display: flex;
            padding-left: 85vw; 
            padding-right: 200px;
            gap: 15px; 
            align-items: flex-start;
            height: 100%;
        }

        .item-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 0; 
            pointer-events: auto;
            max-height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .item-wrapper::-webkit-scrollbar { display: none; }
        .item-wrapper img { display: block; width: 100%; height: auto; cursor: pointer; }
        .item-wrapper img + img { margin-top: 10px; }
        .item-wrapper .caption + img { margin-top: 10px; }

        .caption {
            display: none; 
            font-size: 12px;
            line-height: 1.2;
            background-color: #ffffff;
            padding: 4px 0px 4px 0px;
            width: 100%;
            margin: 0; 
        }
        .item-wrapper.active .caption { display: block; }

        /* --- UI MOBILE --- */
        @media (max-width: 768px) {
            body, html { overflow-y: auto; overflow-x: hidden; height: auto; }
            
            .fixed-ui {
                position: fixed; /* Cambiato da absolute a fixed per rimanere visibile */
                top: 0; left: 0; transform: none;
                flex-direction: column; padding: 15px; gap: 4px;
                background: none; 
                z-index: 1000; /* Alzato per essere sopra lo scroll delle immagini */
                pointer-events: none;
                width: 100%;
            }

            .fixed-ui a {
                pointer-events: auto;
                position: relative;
                z-index: 1001; 
            }

            .nav-item { font-size: 14px; text-align: left !important; }
            .recently-collected { margin-left: 45px; }

            .horizontal-scroll { 
                height: auto; 
                overflow: visible; 
                padding-top: 100px; 
                pointer-events: auto; 
                position: relative; 
                z-index: 10; 
            }

            .gallery { 
                flex-direction: column; 
                padding: 0; 
                gap: 10px; 
                height: auto; 
                align-items: center; 
            }

            .item-wrapper { 
                width: 100vw !important; 
                align-items: center; 
                gap: 0; 
                display: flex; 
                flex-direction: column; 
            }

            .images-container { 
    display: flex; 
    flex-direction: row; 
    overflow-x: auto; 
    scroll-snap-type: x mandatory; 
    gap: 10px; 
    width: 100%; 
    padding: 0 15px; 
    scrollbar-width: none; 
    justify-content: flex-start; 
    align-items: flex-start;
}
            .images-container::-webkit-scrollbar { display: none; }
            
            .images-container:not(:has(img:nth-child(2))) {
                justify-content: center;
                padding: 0 15px;
            }

            .item-wrapper img { 
    width: var(--img-w-mobile); 
    max-width: calc(100vw - 30px); 
    height: auto; 
    flex-shrink: 0; 
    scroll-snap-align: center; 
    display: block; 
    margin-top: 0 !important; 
}

            .caption { 
                display: none; 
                width: 100%; 
                padding: 4px 15px 0px 15px; 
                font-size: 14px; 
                line-height: 1.3; 
                background: white; 
                text-align: left; 
                margin-top: 0; 
            }
            .item-wrapper.active .caption { display: block; }
        }
    </style>
</head>
<body>

        config.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';
            wrapper.style.setProperty('--img-w-mobile', (item.w * 2.5) + 'vw'); 

            if (!isMobile) wrapper.style.width = item.w + 'vw';

            const cap = document.createElement('div');
            cap.className = 'caption';
            cap.innerText = item.text || "";

            const imgContainer = document.createElement('div');
            imgContainer.className = isMobile ? 'images-container' : 'desktop-group';

            item.ids.forEach((id, index) => {
                const img = document.createElement('img');
                img.src = (id === 32 || id === 77 || id === 102 || id === 103) 
                    ? `img/AgnesePozzobon_${id}.gif` 
                    : `img/AgnesePozzobon_${id}.webp`;

                img.loading = "lazy";
                img.onerror = () => img.style.display = 'none';
                img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    wrapper.classList.toggle('active');
                });
                
                if (isMobile) {
                    imgContainer.appendChild(img);
                } else {
                    wrapper.appendChild(img);
                    if (index === 0) wrapper.appendChild(cap);
                }
            });

            if (isMobile) {
                wrapper.appendChild(imgContainer);
                wrapper.appendChild(cap);
            }
            
            gallery.appendChild(wrapper);
        });

        const container = document.getElementById('gallery-container');
        window.addEventListener("wheel", (evt) => {
            if (!isMobile) {
                const activeStack = evt.target.closest('.item-wrapper');
                if (activeStack && activeStack.scrollHeight > activeStack.clientHeight) {
                    const atBottom = activeStack.scrollTop + activeStack.clientHeight >= activeStack.scrollHeight - 1;
                    const atTop = activeStack.scrollTop <= 0;
                    if ((evt.deltaY > 0 && atBottom) || (evt.deltaY < 0 && atTop)) {
                        container.scrollLeft += evt.deltaY;
                    }
                } else {
                    container.scrollLeft += evt.deltaY;
                }
            }
        }, { passive: false });
    </script>
</body>
</html>
