<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* --- DESKTOP UI (INVARIATA) --- */
        .fixed-ui {
            position: fixed;
            top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1;
            pointer-events: none;
        }
        .nav-item { font-size: 13px; color: #000; flex: 1; }
        .nav-item.center { text-align: center; transform: translateX(-25%); }
        .nav-item.right { text-align: right; }
        
        a { text-decoration: none; color: #000; transition: color 0.2s ease; cursor: pointer; position: relative; z-index: 100; pointer-events: auto; }
        a:hover { color: rgb(0, 0, 255) !important; }

        .horizontal-scroll {
            position: relative;
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            z-index: 5;
            pointer-events: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .gallery {
            display: flex;
            padding-left: 85vw; 
            padding-right: 200px;
            gap: 15px; 
            align-items: flex-start;
            height: 100%;
        }

        .item-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
            max-height: 100vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .item-wrapper::-webkit-scrollbar { display: none; }
        .item-wrapper img { display: block; width: 100%; height: auto; cursor: pointer; }

        .caption {
            display: none; 
            font-size: 12px;
            line-height: 1.2;
            background-color: #ffffff;
            padding: 4px 0;
            width: 100%;
            margin-top: -10px; 
        }
        .item-wrapper.active .caption { display: block; }

        /* --- MOBILE VERSION (AGGIORNATA) --- */
        @media (max-width: 768px) {
            body, html { overflow-y: auto; overflow-x: hidden; height: auto; }

            .fixed-ui {
                position: fixed;
                top: 0; left: 0;
                transform: none;
                flex-direction: column;
                align-items: flex-start;
                padding: 12px; /* Margine 12px su tutti i lati */
                gap: 2px;
                background: white;
                z-index: 100;
                pointer-events: auto;
            }
            .nav-item { 
                font-size: 16px; 
                width: calc(100% - 24px); /* Occupa spazio lasciando margini */
                text-align: left !important; 
                transform: none !important; 
            }
            
            .horizontal-scroll {
                height: auto;
                overflow: visible;
                padding-top: 130px;
                pointer-events: auto;
                z-index: 10;
            }

            .gallery {
                flex-direction: column;
                padding: 0;
                gap: 60px;
                height: auto;
                align-items: flex-start; /* Allineamento a sinistra */
            }

            .item-wrapper {
                width: 100% !important; 
                max-width: 100vw;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                scroll-snap-type: x mandatory;
                gap: 15px;
                padding: 0 12px 20px 12px; /* 12px da sinistra e destra */
                align-items: flex-start;
                position: relative;
            }
            
            .item-wrapper img {
                width: calc(var(--mobile-w) * 1.8); /* Leggermente più grandi per mobile */
                max-width: 85vw;
                height: auto;
                flex-shrink: 0;
                scroll-snap-align: start;
            }

            /* Didascalia mobile: nascosta di default, appare al click */
            .caption {
                display: none; 
                position: absolute;
                left: 12px;
                bottom: -5px;
                width: calc(100% - 24px); /* Occupa spazio tra i margini di 12px */
                font-size: 12px;
                background: white;
            }
            .item-wrapper.active .caption { 
                display: block; 
            }
        }
    </style>
</head>
<body>

        config.sort((a, b) => a.ids[0] - b.ids[0]).forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';
            wrapper.style.width = item.w + 'vw';
            wrapper.style.setProperty('--mobile-w', item.w + 'vw');

            item.ids.forEach((id, index) => {
                const img = document.createElement('img');
                img.src = `img/AgnesePozzobon_${id}.webp`;
                img.loading = "lazy";
                img.addEventListener('click', () => wrapper.classList.toggle('active'));
                wrapper.appendChild(img);

                if (index === 0) {
                    const cap = document.createElement('div');
                    cap.className = 'caption';
                    cap.innerText = item.text;
                    wrapper.appendChild(cap);
                }
            });
            gallery.appendChild(wrapper);
        });

        const container = document.getElementById('gallery-container');
        window.addEventListener("wheel", (evt) => {
            if (window.innerWidth > 768) {
                const activeStack = evt.target.closest('.item-wrapper');
                if (activeStack && activeStack.scrollHeight > activeStack.clientHeight) {
                    const atBottom = activeStack.scrollTop + activeStack.clientHeight >= activeStack.scrollHeight - 1;
                    const atTop = activeStack.scrollTop <= 0;
                    if ((evt.deltaY > 0 && atBottom) || (evt.deltaY < 0 && atTop)) {
                        container.scrollLeft += evt.deltaY;
                    } else {
                        return; 
                    }
                } else {
                    container.scrollLeft += evt.deltaY;
                }
            }
        }, { passive: false });
