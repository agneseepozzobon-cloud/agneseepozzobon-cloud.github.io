<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            color: #000000;
            overflow: hidden; /* Evita lo scroll se vogliamo un look da poster statico */
        }

        /* Contenitore Immagini in alto a destra */
        .image-container {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            gap: 15px;
            padding: 20px;
            z-index: 1;
        }

        .image-container img {
            height: 45vh; /* Le immagini occupano quasi metà altezza schermo */
            width: auto;
            display: block;
        }

        /* Griglia dei Testi - Centrata Verticalmente */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* Tre colonne uguali */
            align-items: center; /* Centra verticalmente rispetto alla riga */
            height: 100vh; /* Occupa tutta l'altezza dello schermo */
            padding: 0 4vw; /* Margine laterale dinamico */
            position: relative;
            z-index: 2;
            font-size: 15px; /* Dimensione tipica da design minimale */
            letter-spacing: 0.01em;
        }

        /* Allineamenti orizzontali */
        .col-left { text-align: left; }
        .col-center { text-align: center; }
        .col-right { text-align: right; }

        /* Responsive per Mobile */
        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr; /* Una colonna sola su mobile */
                grid-template-rows: repeat(3, auto);
                justify-content: center;
                gap: 20px;
            }
            .col-left, .col-center, .col-right { 
                text-align: center; 
            }
            .image-container img {
                height: 30vh;
            }
        }
    </style>
</head>

        <img src="images/foto1.jpg" alt="Work
