<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnese Pozzobon</title>
    <link rel="icon" href="img/favicon_black.webp" media="(prefers-color-scheme: light)">
    <link rel="icon" href="img/favicon_white.webp" media="(prefers-color-scheme: dark)">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* UI FISSA */
        .fixed-ui {
            position: fixed;
            top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            pointer-events: none;
        }
        .nav-item { font-size: 13px; color: #000; flex: 1; pointer-events: auto; }
        .nav-item.center { text-align: center; }
        .nav-item.right { text-align: right; }
        
        a { text-decoration: none; color: #000; transition: color 0.2s ease; cursor: pointer; }
        a:hover { color: rgb(0, 0, 255) !important; }

        /* GALLERIA ORIZZONTALE */
        .horizontal-scroll {
            position: relative;
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            z-index: 5;
            pointer-events: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .gallery {
            display: flex;
            padding-left: 85vw; 
            padding-right: 200px;
            gap: 40px; /* Spazio tra le colonne */
            align-items: center; 
            height: 100%;
        }

        /* COLONNA (STACK) */
        .item-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px; 
            pointer-events: auto;
            max-height: 85vh; /* Altezza massima per permettere lo scroll verticale */
            overflow-y: auto;
            scrollbar-width: none;
            padding: 20px 0;
        }
        .item-wrapper::-webkit-scrollbar { display: none; }

        .item-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        /* DIDASCALIA */
        .caption {
            display: none; 
            font-size: 12px;
            line-height: 1.2;
            background-color: #ffffff;
            padding: 5px 0;
            width: 100%;
            word-wrap: break-word;
        }

        .item-wrapper.active { gap: 0; }
        .item-wrapper.active .caption { display: block; }
        .item-wrapper.active .caption + img { margin-top: 15px; }

    </style>
</head>
<body>

        const totalImages = 135;
        let usedIds = new Set();
        config.forEach(c => c.ids.forEach(id => usedIds.add(id)));

        // Genera config per ID mancanti (se presenti)
        for (let i = 1; i <= totalImages; i++) {
            if (usedIds.has(i)) continue;
            config.push({ w: 25, ids: [i], text: "Agnese Pozzobon, Project " + i });
        }

        // Render
        config.sort((a, b) => a.ids[0] - b.ids[0]).forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';
            wrapper.style.width = item.w + 'vw';

            item.ids.forEach((id, index) => {
                const img = document.createElement('img');
                img.src = `img/AgnesePozzobon_${id}.webp`;
                img.loading = "lazy";
                
                img.addEventListener('click', () => {
                    wrapper.classList.toggle('active');
                });

                wrapper.appendChild(img);

                if (index === 0) {
                    const cap = document.createElement('div');
                    cap.className = 'caption';
                    cap.innerText = item.text;
                    wrapper.appendChild(cap);
                }
            });

            gallery.appendChild(wrapper);
        });

        // Scroll Logic
        const container = document.getElementById('gallery-container');
        window.addEventListener("wheel", (evt) => {
            const activeStack = evt.target.closest('.item-wrapper');
            // Se siamo sopra una colonna che può scrollare, lasciamo lo scroll verticale nativo
            if (activeStack && activeStack.scrollHeight > activeStack.clientHeight) {
                return; 
            }
            // Altrimenti scroll orizzontale
            container.scrollLeft += evt.deltaY;
        }, { passive: true });
    </script>
